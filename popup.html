<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gemini Enter Key Control</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 220px;
      margin: 0;
      padding: 12px;
      box-sizing: border-box;
    }

    .section {
      margin-bottom: 12px;
    }

    .title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 12px 0;
    }

    .footer {
      margin-top: 4px;
      text-align: right;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="section title" id="app-header">Gemini Enter Key Control</div>

  <div class="section">
    <label>
      <input type="checkbox" id="toggle">
      <span id="label-enable-enter-control">Enable Enter control</span>
    </label>
  </div>

  <hr>

  <div class="section">
    <div class="title" id="title-send-key">Send key</div>
    <label>
      <input type="radio" name="mode" value="shift">
      Shift+Enter
    </label>
    <label>
      <input type="radio" name="mode" value="ctrl">
      Ctrl+Enter
    </label>
    <label>
      <input type="radio" name="mode" value="both">
      Shift+Enter / Ctrl+Enter
    </label>
    <label>
      <input type="radio" name="mode" value="combo">
      Shift+Ctrl+Enter
    </label>
  </div>

  <div class="footer" id="app-version">v</div>

  <script src="popup.js"></script>
</body>
</html>
